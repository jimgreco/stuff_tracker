name: App Store Screenshots

on:
  workflow_dispatch:
    inputs:
      upload_to_app_store:
        description: Replace screenshots on the editable App Store Connect version
        required: true
        type: choice
        default: "false"
        options:
          - "false"
          - "true"
      app_store_version:
        description: Optional App Store version override; defaults to Xcode MARKETING_VERSION
        required: false
        type: string
      devices:
        description: Comma-separated simulator names
        required: true
        type: string
        default: "iPhone 17 Pro Max,iPad Pro 13-inch (M5)"

jobs:
  screenshots:
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      FASTLANE_SKIP_UPDATE_CHECK: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode 26
        run: |
          set -euo pipefail
          ls /Applications | grep -i '^Xcode' || true
          for p in /Applications/Xcode_26.app /Applications/Xcode_26.0.app /Applications/Xcode_26.1.app /Applications/Xcode_26.2.app /Applications/Xcode-26.app /Applications/Xcode.app; do
            if [ -d "$p" ]; then
              sudo xcode-select -s "$p/Contents/Developer"
              echo "Selected: $p"
              break
            fi
          done
          xcodebuild -version

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Generate screenshots
        env:
          SCREENSHOT_DEVICES: ${{ inputs.devices }}
        run: bundle exec fastlane ios screenshots

      - name: Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-store-screenshots
          path: fastlane/screenshots
          if-no-files-found: warn

      - name: Upload screenshots to App Store Connect
        if: ${{ inputs.upload_to_app_store == 'true' }}
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_VERSION: ${{ inputs.app_store_version }}
        run: bundle exec fastlane ios upload_screenshots
