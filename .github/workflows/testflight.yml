name: TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/testflight.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # build phase uses `git rev-list HEAD --count` for build number

      - name: Select Xcode 26
        run: |
          ls /Applications | grep -i '^Xcode' || true
          # Try common paths for Xcode 26
          for p in /Applications/Xcode_26.app /Applications/Xcode_26.0.app /Applications/Xcode_26.1.app /Applications/Xcode_26.2.app /Applications/Xcode-26.app /Applications/Xcode.app; do
            if [ -d "$p" ]; then
              sudo xcode-select -s "$p/Contents/Developer"
              echo "Selected: $p"
              break
            fi
          done
          xcodebuild -version

      - name: Import signing assets
        env:
          CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          CERT_PWD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          KC_PWD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"

          # Create a temporary keychain
          security create-keychain -p "$KC_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PWD" "$KEYCHAIN"

          # Make it the default and search-list keychain
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/[\"]//g')
          security default-keychain -s "$KEYCHAIN"

          # Decode the .p12 (printf avoids echo interpreting backslashes)
          printf '%s' "$CERT_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"

          # Diagnostics: file size and password length (length only, no value)
          echo "p12 size: $(stat -f%z "$RUNNER_TEMP/cert.p12") bytes"
          echo "password length: ${#CERT_PWD}"

          # Verify the .p12 with openssl using the same password (same check that passes locally)
          if openssl pkcs12 -in "$RUNNER_TEMP/cert.p12" -noout -passin pass:"$CERT_PWD"; then
            echo "openssl pkcs12 verification: OK"
          else
            echo "openssl pkcs12 verification: FAILED — secret password/file mismatch"
            exit 1
          fi

          # Import the distribution certificate
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KC_PWD" "$KEYCHAIN"

          # Install the provisioning profile where Xcode looks for it
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles/dist.mobileprovision"
          printf '%s' "$PROFILE" | base64 -d > "$PROFILE_PATH"

          # Diagnostics: show the profile's identity, bundle ID, type and expiry
          PROFILE_PLIST=$(security cms -D -i "$PROFILE_PATH")
          echo "--- Provisioning profile ---"
          echo "Name:    $(echo "$PROFILE_PLIST" | plutil -extract Name raw -o - -)"
          echo "AppID:   $(echo "$PROFILE_PLIST" | plutil -extract Entitlements.application-identifier raw -o - -)"
          echo "Team:    $(echo "$PROFILE_PLIST" | plutil -extract TeamIdentifier.0 raw -o - -)"
          echo "Expires: $(echo "$PROFILE_PLIST" | plutil -extract ExpirationDate raw -o - -)"
          echo "Type:    $(echo "$PROFILE_PLIST" | plutil -extract ProvisionsAllDevices raw -o - - 2>/dev/null || echo 'app-store or ad-hoc')"

      - name: Set up App Store Connect API key
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          set -euo pipefail
          echo "KEY_ID length: ${#KEY_ID}"
          echo "ISSUER_ID length: ${#ISSUER_ID}"
          echo "API_KEY length: ${#API_KEY}"
          if [ -z "$KEY_ID" ] || [ -z "$ISSUER_ID" ] || [ -z "$API_KEY" ]; then
            echo "Missing App Store Connect API secret"
            exit 1
          fi
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_FILE="$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8"
          printf '%s' "$API_KEY" > "$KEY_FILE"
          echo "key file first line: $(head -n 1 "$KEY_FILE")"
          echo "key file last line: $(tail -n 1 "$KEY_FILE")"
          echo "key file line count: $(wc -l < "$KEY_FILE")"
          echo "API_KEY_PATH=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Archive
        working-directory: ios
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project StuffTracker.xcodeproj \
            -scheme StuffTracker \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/StuffTracker.xcarchive" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            archive

      - name: Export IPA
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>V6JPQCD336</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.jimgreco.stufftracker</key>
              <string>Stuff Tacker App Store</string>
            </dict>
            <key>stripSwiftSymbols</key><true/>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/StuffTracker.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID"

      - name: Upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/StuffTracker.ipa" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" || true
