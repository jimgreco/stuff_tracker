name: TestFlight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 30
    outputs:
      run_build: ${{ steps.changes.outputs.run_build }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Plan iOS workflow
        id: changes
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
            echo "run_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            changed_files=$(git ls-tree -r --name-only HEAD)
          else
            changed_files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          fi

          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(ios/|\.github/workflows/testflight\.yml$)'; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
          fi

          echo "run_build=false" >> "$GITHUB_OUTPUT"

      - name: No iOS changes
        if: steps.changes.outputs.run_tests != 'true'
        run: echo "No iOS changes detected; required test check satisfied."

      - name: Select Xcode 26
        if: steps.changes.outputs.run_tests == 'true'
        run: |
          ls /Applications | grep -i '^Xcode' || true
          for p in /Applications/Xcode_26.app /Applications/Xcode_26.0.app /Applications/Xcode_26.1.app /Applications/Xcode_26.2.app /Applications/Xcode-26.app /Applications/Xcode.app; do
            if [ -d "$p" ]; then
              sudo xcode-select -s "$p/Contents/Developer"
              echo "Selected: $p"
              break
            fi
          done
          xcodebuild -version

      - name: Prepare iOS simulator
        if: steps.changes.outputs.run_tests == 'true'
        id: simulator
        run: |
          set -euo pipefail

          runtime=$(xcrun simctl list runtimes --json | ruby -rjson -e '
            def version_key(value)
              value.to_s.scan(/\d+/).map(&:to_i)
            end

            runtimes = JSON.parse(STDIN.read).fetch("runtimes").select do |runtime|
              runtime["isAvailable"] && runtime["platform"] == "iOS"
            end
            selected = runtimes.max_by { |runtime| version_key(runtime["version"]) }
            abort("No available iOS simulator runtime found") unless selected
            puts selected.fetch("identifier")
          ')

          device_type=$(xcrun simctl list devicetypes --json | ruby -rjson -e '
            data = JSON.parse(STDIN.read)
            types = data.fetch("devicetypes").select { |type| type["name"].to_s.include?("iPhone") }
            preferred = [
              "com.apple.CoreSimulator.SimDeviceType.iPhone-17-Pro",
              "com.apple.CoreSimulator.SimDeviceType.iPhone-17",
              "com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro",
              "com.apple.CoreSimulator.SimDeviceType.iPhone-16",
              "com.apple.CoreSimulator.SimDeviceType.iPhone-15-Pro",
              "com.apple.CoreSimulator.SimDeviceType.iPhone-15"
            ]
            selected = preferred.filter_map { |identifier| types.find { |type| type["identifier"] == identifier } }.first
            selected ||= types.reverse.find { |type| type["name"].to_s.include?("Pro") }
            selected ||= types.last
            abort("No iPhone simulator device type found") unless selected
            puts selected.fetch("identifier")
          ')

          udid=$(xcrun simctl create "StuffTracker CI" "$device_type" "$runtime")
          xcrun simctl boot "$udid" || true
          xcrun simctl bootstatus "$udid" -b
          echo "destination=platform=iOS Simulator,id=$udid" >> "$GITHUB_OUTPUT"

      - name: Run iOS tests
        if: steps.changes.outputs.run_tests == 'true'
        working-directory: ios
        run: |
          xcodebuild \
            -project StuffTracker.xcodeproj \
            -scheme StuffTracker \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination '${{ steps.simulator.outputs.destination }}' \
            test

  build:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.test.outputs.run_build == 'true'
    needs: test
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # build phase uses `git rev-list HEAD --count` for build number

      - name: Select Xcode 26
        run: |
          ls /Applications | grep -i '^Xcode' || true
          # Try common paths for Xcode 26
          for p in /Applications/Xcode_26.app /Applications/Xcode_26.0.app /Applications/Xcode_26.1.app /Applications/Xcode_26.2.app /Applications/Xcode-26.app /Applications/Xcode.app; do
            if [ -d "$p" ]; then
              sudo xcode-select -s "$p/Contents/Developer"
              echo "Selected: $p"
              break
            fi
          done
          xcodebuild -version

      - name: Import signing certificate
        env:
          CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          CERT_PWD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KC_PWD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"

          # Create a temporary keychain
          security create-keychain -p "$KC_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KC_PWD" "$KEYCHAIN"

          # Make it the default and search-list keychain
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/[\"]//g')
          security default-keychain -s "$KEYCHAIN"

          # Decode the .p12 (printf avoids echo interpreting backslashes)
          printf '%s' "$CERT_P12" | base64 -d > "$RUNNER_TEMP/cert.p12"

          # Diagnostics: file size and password length (length only, no value)
          echo "p12 size: $(stat -f%z "$RUNNER_TEMP/cert.p12") bytes"
          echo "password length: ${#CERT_PWD}"

          # Verify the .p12 with openssl using the same password (same check that passes locally)
          if openssl pkcs12 -in "$RUNNER_TEMP/cert.p12" -noout -passin pass:"$CERT_PWD"; then
            echo "openssl pkcs12 verification: OK"
          else
            echo "openssl pkcs12 verification: FAILED — secret password/file mismatch"
            exit 1
          fi

          # Import the distribution certificate
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KC_PWD" "$KEYCHAIN"

      - name: Set up App Store Connect API key
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          set -euo pipefail
          echo "KEY_ID length: ${#KEY_ID}"
          echo "ISSUER_ID length: ${#ISSUER_ID}"
          echo "API_KEY length: ${#API_KEY}"
          if [ -z "$KEY_ID" ] || [ -z "$ISSUER_ID" ] || [ -z "$API_KEY" ]; then
            echo "Missing App Store Connect API secret"
            exit 1
          fi
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_FILE="$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8"
          printf '%s' "$API_KEY" > "$KEY_FILE"
          echo "key file first line: $(head -n 1 "$KEY_FILE")"
          echo "key file last line: $(tail -n 1 "$KEY_FILE")"
          echo "key file line count: $(wc -l < "$KEY_FILE")"
          echo "API_KEY_PATH=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Compute CI build number
        run: |
          set -euo pipefail
          build_number=$(git rev-list HEAD --count)
          echo "CI_BUILD_NUMBER=$build_number" >> "$GITHUB_ENV"
          echo "Build number: $build_number"

      - name: Refresh App Store provisioning profile
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          IOS_BUNDLE_ID: com.jimgreco.stufftracker
          IOS_PROFILE_NAME: Stuff Tacker App Store
        run: ruby scripts/refresh_app_store_profile.rb

      - name: Archive
        working-directory: ios
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project StuffTracker.xcodeproj \
            -scheme StuffTracker \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/StuffTracker.xcarchive" \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            archive

      - name: Export IPA
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>V6JPQCD336</string>
            <key>signingStyle</key><string>manual</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.jimgreco.stufftracker</key>
              <string>Stuff Tacker App Store</string>
            </dict>
            <key>stripSwiftSymbols</key><true/>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/StuffTracker.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$API_KEY_PATH" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID"

      - name: Upload to TestFlight
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/StuffTracker.ipa" \
            --apiKey "$KEY_ID" \
            --apiIssuer "$ISSUER_ID"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" || true
