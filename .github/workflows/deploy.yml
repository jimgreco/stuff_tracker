name: Deploy to EC2

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stuff_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stuff_tracker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stuff_tracker_test
      JWT_SECRET: ci-test-secret-that-is-long-enough-for-runtime
      GOOGLE_CLIENT_ID: ci-google-client-id
      APPLE_BUNDLE_ID: com.jimgreco.stufftracker
      NODE_ENV: test
      RUN_DATABASE_INTEGRATION_TESTS: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run build

      - name: Test
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev

  deploy:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Transfer backend to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem
          if [ -n "$EC2_SSH_KNOWN_HOSTS" ]; then
            printf '%s\n' "$EC2_SSH_KNOWN_HOSTS" > known_hosts
          else
            ssh-keyscan -H "$EC2_HOST" > known_hosts
          fi
          chmod 600 known_hosts
          test -s known_hosts
          rsync -avz -e "ssh -i key.pem -o StrictHostKeyChecking=yes -o UserKnownHostsFile=known_hosts" \
            --exclude '.git' \
            --exclude '.DS_Store' \
            --exclude 'node_modules' \
            --exclude '.env' \
            backend/ "$EC2_USER@$EC2_HOST:~/stuff_tracker/backend/"

      - name: Rebuild stuff container
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=yes -o UserKnownHostsFile=known_hosts "$EC2_USER@$EC2_HOST" \
            "cd ~/deploy && docker-compose up -d --build stuff && docker system prune -f"
