name: Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      run_deploy: ${{ steps.changes.outputs.run_deploy }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stuff_tracker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d stuff_tracker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stuff_tracker_test
      JWT_SECRET: ci-test-secret-that-is-long-enough-for-runtime
      GOOGLE_CLIENT_ID: ci-google-client-id
      APPLE_BUNDLE_ID: com.jimgreco.stufftracker
      NODE_ENV: test
      RUN_DATABASE_INTEGRATION_TESTS: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect backend changes
        id: changes
        working-directory: .
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            changed_files=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            changed_files=$(git ls-tree -r --name-only HEAD)
          else
            changed_files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          fi

          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(backend/|web/|\.github/workflows/deploy\.yml$)'; then
            echo "run_backend=true" >> "$GITHUB_OUTPUT"
            echo "run_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_backend=false" >> "$GITHUB_OUTPUT"
            echo "run_deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: No backend changes
        if: steps.changes.outputs.run_backend != 'true'
        working-directory: .
        run: echo "No backend changes detected; required verify check satisfied."

      - name: Set up Node
        if: steps.changes.outputs.run_backend == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.run_backend == 'true'
        run: npm ci

      - name: Typecheck
        if: steps.changes.outputs.run_backend == 'true'
        run: npm run build

      - name: Test
        if: steps.changes.outputs.run_backend == 'true'
        run: npm test

      - name: Audit production dependencies
        if: steps.changes.outputs.run_backend == 'true'
        run: npm audit --omit=dev

  deploy:
    if: github.event_name == 'push' && needs.verify.outputs.run_deploy == 'true'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Transfer stuff app to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem
          test -n "$EC2_SSH_KNOWN_HOSTS"
          printf '%s\n' "$EC2_SSH_KNOWN_HOSTS" > known_hosts
          chmod 600 known_hosts
          test -s known_hosts
          rsync -avz -e "ssh -i key.pem -o StrictHostKeyChecking=yes -o UserKnownHostsFile=known_hosts" \
            --exclude '.git' \
            --exclude '.DS_Store' \
            --exclude 'node_modules' \
            --exclude '.env' \
            backend/ "$EC2_USER@$EC2_HOST:~/stuff_tracker/backend/"
          rsync -avz -e "ssh -i key.pem -o StrictHostKeyChecking=yes -o UserKnownHostsFile=known_hosts" \
            --exclude '.DS_Store' \
            web/ "$EC2_USER@$EC2_HOST:~/stuff_tracker/web/"

      - name: Rebuild stuff container
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=yes -o UserKnownHostsFile=known_hosts "$EC2_USER@$EC2_HOST" \
            "cd ~/deploy && docker-compose up -d --build stuff && docker system prune -f"

      - name: Wait for stuff service
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=yes -o UserKnownHostsFile=known_hosts "$EC2_USER@$EC2_HOST" '
            set -eu
            cd ~/deploy
            for attempt in $(seq 1 60); do
              if docker-compose exec -T stuff node -e "fetch(\"http://127.0.0.1:\" + (process.env.PORT || 3002) + \"/health/live\").then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))" >/dev/null 2>&1; then
                echo "stuff service is ready"
                exit 0
              fi

              if [ "$attempt" = "60" ]; then
                echo "stuff service did not become ready"
                docker-compose ps stuff || true
                docker-compose logs --tail=100 stuff || true
                exit 1
              fi

              sleep 2
            done
          '

      - name: Run post-deploy smoke tests
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=yes -o UserKnownHostsFile=known_hosts "$EC2_USER@$EC2_HOST" \
            "cd ~/deploy && docker-compose exec -T stuff npm run smoke:deploy || (docker-compose ps stuff && docker-compose logs --tail=100 stuff && false)"
