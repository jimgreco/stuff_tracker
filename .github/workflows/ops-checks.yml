name: Production Ops Checks

on:
  schedule:
    - cron: "43 11 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ops-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
      EC2_USER: ${{ secrets.EC2_USER }}

    steps:
      - name: Check whether production SSH is configured
        id: config
        run: |
          set -euo pipefail

          if [ -z "${EC2_HOST:-}" ] || [ -z "${EC2_USER:-}" ] || [ -z "${EC2_SSH_KEY:-}" ] || [ -z "${EC2_SSH_KNOWN_HOSTS:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Production ops checks skipped::Set EC2_HOST, EC2_USER, EC2_SSH_KEY, and EC2_SSH_KNOWN_HOSTS to enable scheduled production ops checks."
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        if: steps.config.outputs.configured == 'true'
        run: |
          set -euo pipefail
          printf '%s' "$EC2_SSH_KEY" > key.pem
          chmod 600 key.pem
          printf '%s\n' "$EC2_SSH_KNOWN_HOSTS" > known_hosts
          chmod 600 known_hosts
          test -s known_hosts

      - name: Run backup freshness and S3 hardening checks
        if: steps.config.outputs.configured == 'true'
        run: |
          set -euo pipefail
          ssh -i key.pem -o StrictHostKeyChecking=yes -o UserKnownHostsFile=known_hosts "$EC2_USER@$EC2_HOST" \
            'cd ~/deploy &&
              read_env() {
                key="$1"
                line="$(grep -E "^${key}=" .env | tail -n 1 || true)"
                value="${line#*=}"
                value="${value%\"}"
                value="${value#\"}"
                value="${value%\047}"
                value="${value#\047}"
                printf "%s" "$value"
              } &&
              backup_dir="$(read_env STUFF_DB_BACKUP_DIR)" &&
              backup_dir="${backup_dir:-$HOME/deploy/backups/stuff}" &&
              max_age_hours="$(read_env DB_BACKUP_MAX_AGE_HOURS)" &&
              max_age_hours="${max_age_hours:-26}" &&
              if [ ! -d "$backup_dir" ]; then
                echo "::error title=Backup freshness failed::Backup directory is missing: $backup_dir"
                exit 1
              fi &&
              newest="$(find "$backup_dir" -type f -name "stuff-tracker-*.sql.gz" -size +0c -printf "%T@ %p\n" | sort -nr | head -n 1 | cut -d " " -f 2-)" &&
              if [ -z "$newest" ]; then
                echo "::error title=Backup freshness failed::No non-empty stuff-tracker backups found in $backup_dir"
                exit 1
              fi &&
              newest_epoch="$(stat -c %Y "$newest")" &&
              now_epoch="$(date +%s)" &&
              max_age_seconds="$((max_age_hours * 3600))" &&
              age_seconds="$((now_epoch - newest_epoch))" &&
              if [ "$age_seconds" -gt "$max_age_seconds" ]; then
                echo "::error title=Backup freshness failed::Newest backup is older than ${max_age_hours}h: $newest"
                exit 1
              fi &&
              echo "Newest backup is fresh: $newest" &&
              docker-compose exec -T stuff npm run storage:s3:check'

  notify-failure:
    if: ${{ always() && (needs.ops-checks.result == 'failure' || needs.ops-checks.result == 'cancelled') }}
    needs: ops-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Notify operations
        uses: ./.github/actions/notify-operations
        with:
          webhook-url: ${{ secrets.OPERATIONS_ALERT_WEBHOOK_URL }}
          title: Production ops check failed
          summary: ops-checks=${{ needs.ops-checks.result }}
