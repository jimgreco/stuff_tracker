name: Production Ops Checks

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/ops-checks.yml
      - docs/OPERATIONS.md
      - docs/HARDENING_BACKLOG.md
      - backend/scripts/check-backup-freshness.cjs
      - backend/scripts/check-s3-hardening.cjs
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ops-checks.yml
      - docs/OPERATIONS.md
      - docs/HARDENING_BACKLOG.md
      - backend/scripts/check-backup-freshness.cjs
      - backend/scripts/check-s3-hardening.cjs
  schedule:
    - cron: "43 11 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ops-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      EC2_SSH_KNOWN_HOSTS: ${{ secrets.EC2_SSH_KNOWN_HOSTS }}
      EC2_USER: ${{ secrets.EC2_USER }}

    steps:
      - name: Check whether production SSH is configured
        id: config
        run: |
          set -euo pipefail

          if [ -z "${EC2_HOST:-}" ] || [ -z "${EC2_USER:-}" ] || [ -z "${EC2_SSH_KEY:-}" ] || [ -z "${EC2_SSH_KNOWN_HOSTS:-}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Production ops checks skipped::Set EC2_HOST, EC2_USER, EC2_SSH_KEY, and EC2_SSH_KNOWN_HOSTS to enable scheduled production ops checks."
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH
        if: steps.config.outputs.configured == 'true'
        run: |
          set -euo pipefail
          printf '%s' "$EC2_SSH_KEY" > key.pem
          chmod 600 key.pem
          printf '%s\n' "$EC2_SSH_KNOWN_HOSTS" > known_hosts
          chmod 600 known_hosts
          test -s known_hosts

      - name: Run backup freshness and S3 hardening checks
        if: steps.config.outputs.configured == 'true'
        run: |
          set -euo pipefail
          ssh -i key.pem -o StrictHostKeyChecking=yes -o UserKnownHostsFile=known_hosts "$EC2_USER@$EC2_HOST" \
            "cd ~/deploy && docker-compose exec -T stuff npm run db:backup:check && docker-compose exec -T stuff npm run storage:s3:check"
